<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow AI | Understand Your Workload Before Burnout Begins</title>
    <meta name="description" content="MindFlow AI analyzes workload, stress patterns, and productivity behavior to create smarter study experiences.">
    
    <!-- Premium Fonts from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styling stylesheets -->
  <script type="module" crossorigin src="/assets/index-CH8FmXKl.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DCdR16lq.css">
</head>
<body data-theme="home">

    <!-- Global Parallax and Canvas Background Layer -->
    <div class="background-container">
        <!-- Ambient moving clouds -->
        <div class="cloud-container">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        
        <!-- Ambient light rays overlay -->
        <div class="light-rays-overlay"></div>
        
        <!-- Far Layer (Slowest parallax, morning light, far mountains, minimal glowing circles) -->
        <div class="bg-layer bg-layer-far">
            <div class="glowing-orb orb-1"></div>
            <div class="glowing-orb orb-2"></div>
            <div class="morning-light-glow"></div>
            <div class="mountain-layer mountain-far"></div>
        </div>
        <!-- Middle Layer (Medium speed parallax, middle mountains + inter-mountain fog) -->
        <div class="bg-layer bg-layer-mid">
            <div class="mountain-layer mountain-mid"></div>
            <div class="mountain-fog"></div>
        </div>
        <!-- Foreground Layer (Interactive particles canvas, foreground mountains, bottom mist) -->
        <canvas id="particles-canvas"></canvas>
        <div class="bg-layer bg-layer-fore">
            <div class="mountain-layer mountain-fore"></div>
            <div class="mist-overlay"></div>
        </div>
    </div>

    <!-- Global Premium Breadcrumb Navigation Bar -->
    <header class="header">
        <div class="nav-container">
            <div class="nav-breadcrumbs" id="nav-breadcrumbs">
                <!-- Dynamically populated by router.js -->
                <a href="/" class="breadcrumb-link" id="breadcrumb-home">MindFlow AI</a>
            </div>
            <div class="nav-actions" id="nav-actions">
                <a href="/ai-companion" class="nav-cta-link" data-route="/ai-companion">Start Journey</a>
            </div>
        </div>
    </header>

    <!-- Router View Port - Dynamic screens mount here -->
    <main id="app" class="app-container">
        <!-- Content will be injected dynamically by router.js -->
    </main>

    <!-- Global AI Moment Overlay (Chaos to Clarity) -->
    <div id="ai-moment-overlay" class="ai-moment-overlay" style="display: none;">
        <div class="ai-moment-content">
            <!-- Pulsing central orb -->
            <div class="ai-moment-orb-wrapper">
                <div class="ai-moment-orb-ring"></div>
                <div class="ai-moment-orb"></div>
            </div>
            
            <!-- Floating chaotic task cards -->
            <div class="chaos-cards-container" id="chaos-cards-container">
                <div class="floating-ai-card" id="fcard-1">📝 Assignments</div>
                <div class="floating-ai-card" id="fcard-2">🚀 Hackathons</div>
                <div class="floating-ai-card" id="fcard-3">📅 Deadlines</div>
                <div class="floating-ai-card" id="fcard-4">⚡ Stress Indicators</div>
            </div>

            <div class="ai-moment-text-container">
                <div class="ai-moment-status" id="ai-moment-status">Analyzing workload...</div>
                <div class="ai-moment-steps">
                    <span class="step-dot active" id="step-dot-1"></span>
                    <span class="step-dot" id="step-dot-2"></span>
                    <span class="step-dot" id="step-dot-3"></span>
                </div>
                <div class="ai-moment-percentage" id="ai-moment-percentage" style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; color: #ffffff; margin-top: 0.75rem; opacity: 0.85;">0%</div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
</body>
</html>
